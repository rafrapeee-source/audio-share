<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Share</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/socket.io/socket.io.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center p-4">
  <div class="max-w-md w-full bg-gray-800 p-8 rounded-lg shadow-lg border border-gray-700">
    <h1 class="text-2xl font-bold text-center mb-6 text-indigo-400">Audio Share</h1>

    <!-- Selection Panel -->
    <div id="selection-panel" class="space-y-6">
      <div class="p-4 border border-indigo-500/30 bg-indigo-500/10 rounded-md">
        <h2 class="text-lg font-semibold mb-2">Host a Stream</h2>
        <p class="text-sm text-gray-400 mb-4">Share your system audio with others. Make sure to check "Share audio" when prompted.</p>
        <button id="btn-host" class="w-full bg-indigo-600 hover:bg-indigo-500 py-2 px-4 rounded font-medium transition duration-200">
          Create Broadcast Room
        </button>
      </div>

      <div class="p-4 border border-gray-700 bg-gray-700/30 rounded-md">
        <h2 class="text-lg font-semibold mb-2">Listen to a Stream</h2>
        <input type="text" id="input-room-id" placeholder="Enter Room ID" class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 mb-3 text-white focus:outline-none focus:border-indigo-500">
        <button id="btn-join" class="w-full bg-emerald-600 hover:bg-emerald-500 py-2 px-4 rounded font-medium transition duration-200">
          Join Room
        </button>
      </div>
    </div>

    <!-- Active Stream Panel -->
    <div id="stream-panel" class="hidden space-y-4">
      <div class="text-center">
        <span class="inline-block px-3 py-1 bg-rose-500/20 text-rose-400 border border-rose-500/30 rounded-full text-xs font-semibold animate-pulse uppercase tracking-wider mb-2">
          Live
        </span>
        <h2 id="stream-status" class="text-xl font-bold">Connecting...</h2>
        <p class="text-sm text-gray-400 mt-2">Room ID: <span id="display-room-id" class="font-mono text-indigo-300 font-bold select-all"></span></p>
      </div>

      <div class="bg-gray-900 p-4 rounded border border-gray-700 flex flex-col items-center justify-center min-h-[100px]">
        <p id="participant-info" class="text-sm text-gray-400">Waiting for participants...</p>
        <!-- Audio element to play stream for listeners -->
        <audio id="remote-audio" autoplay controls class="mt-4 w-full hidden"></audio>
      </div>

      <button id="btn-leave" class="w-full bg-red-600 hover:bg-red-500 py-2 px-4 rounded font-medium transition duration-200">
        Stop / Leave
      </button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
